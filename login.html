<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>크잉에듀 로그인</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6f7fb;
      }

      .login-card {
        width: min(440px, 100%);
        padding: 34px;
        border: 1px solid #e0e5ee;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(20, 24, 36, 0.12);
      }

      .login-card img {
        width: 220px;
        max-width: 100%;
        margin-bottom: 28px;
      }

      .login-card h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .login-card p {
        margin: 0 0 26px;
        color: #606878;
        line-height: 1.6;
      }

      .login-card form {
        display: grid;
        gap: 14px;
      }

      .login-error {
        min-height: 22px;
        color: #e03d52;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <img src="assets/kringedu-logo-transparent.png" alt="크잉에듀 Creative English" />
      <h1>앱 사용 비밀번호</h1>
      <p>승인된 원장님만 크잉에듀 콘텐츠 제작 도구를 사용할 수 있습니다.</p>
      <form id="loginForm">
        <label>
          비밀번호
          <input name="password" type="password" autocomplete="current-password" required autofocus />
        </label>
        <button class="primary-button" type="submit">입장하기</button>
        <div class="login-error" id="loginError" role="alert"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#loginForm");
      const error = document.querySelector("#loginError");
      const next = new URLSearchParams(location.search).get("next") || "/";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        const button = form.querySelector("button");
        button.disabled = true;
        button.textContent = "확인 중...";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(Object.fromEntries(new FormData(form)))
          });
          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(data.error || "비밀번호를 확인해 주세요.");
          }

          location.replace(next);
        } catch (loginError) {
          error.textContent = loginError.message;
        } finally {
          button.disabled = false;
          button.textContent = "입장하기";
        }
      });
    </script>
  </body>
</html>
